name: Create Major Release

permissions:
  contents: write
  issues: write

on: workflow_dispatch

jobs:
  release:
    name: Publish new major release
    outputs:
      version: ${{ steps.newVersion.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
      - name: Generate version name
        id: newVersion
        run: |
          git fetch --tags
          latest=$(git tag --sort=version:refname | tail -n 1)
          currVersion="${latest#v}"
          currVersion="${currVersion%%-*}"
          major=$(echo "$currVersion" | cut -d. -f1)
          major=$((major + 1))
          newVersion="${major}.0.0"
          echo "version=$newVersion" >> $GITHUB_OUTPUT
      - name: Build asset
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -Pversion=${{ steps.newVersion.outputs.version }}
      - name: Create major release v${{ steps.newVersion.outputs.version }}
        run: |
          gh release create v${{ steps.newVersion.outputs.version }} \
            --generate-notes \
            build/libs/yell-store-services-${{ steps.newVersion.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  label:
    name: Add release label to issues
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create new label "released:v${{ needs.release.outputs.version }}"
        id: newLabel
        run: |
          label="released:v${{ needs.release.outputs.version }}"

          gh label create "$label" \
            --color "#a9a68d" \
            --description "Issues fixed in version ${{ needs.release.outputs.version }}" \
            || echo "Label already exists"

          echo "label=$label" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attach label to closed issues
        run: |
          version=${{ needs.release.outputs.version }}

          # Get previous tag
          prev=$(gh release list --limit 2 --json tagName --jq '.[1].tagName')

          # Get previous release date
          prev_date=$(gh release view "$prev" --json publishedAt --jq '.publishedAt')
          curr_date=$(gh release view "v$version" --json publishedAt --jq '.publishedAt')

          # Fetch closed issues and filter by timestamp window
          issues=$(gh api repos/$GITHUB_REPOSITORY/issues \
            --method GET \
            --paginate \
            -F state=closed \
            -q '.[] 
              | select(.closed_at != null) 
              | select(.closed_at > "'"$prev_date"'" and .closed_at <= "'"$curr_date"'") 
              | .number')

          for issue in $issues; do
            echo "Labeling issue #$issue"
            gh issue edit "$issue" --add-label "${{ steps.newLabel.outputs.label }}"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}