spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    locations: "classpath:db/migration,classpath:db/migration-postgresql"
    placeholders:
      emailCheck: "buyer_email ~ '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'"

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

images:
  provider: ${IMAGE_PROVIDER}
  upload-dir: ${IMAGE_UPLOAD_DIR}
  bucket: ${IMAGE_BUCKET}
  base-url: ${IMAGE_BASE_URL}

paypal:
  client-id: ${PAYPAL_CLIENT_ID}
  client-secret: ${PAYPAL_CLIENT_SECRET}
  mode: live

jobs:
  stale-order-cleanup:
    enabled: ${JOB_STALE_ORDERS_ENABLED:true}
    cutoff-days: ${JOB_STALE_ORDERS_CUTOFF_DAYS:3}
    cron: "${JOB_STALE_ORDERS_CRON:0 0 2 * * *}"

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
