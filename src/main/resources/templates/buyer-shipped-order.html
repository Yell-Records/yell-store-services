<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <style>
        /* --- Layout & Spacing --- */
        .mb-20 { margin-bottom: 20px; }
        .mt-0 { margin-top: 0; }

        /* --- Table Wrappers --- */
        .table {
            border-collapse: collapse;
            width: 100%;
            border-top: 1px solid #ddd;
            border-left: 1px solid #ddd;
            margin-bottom: 20px;
        }

        /* --- Table Cells --- */
        .cell {
            font-size: 14px;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            text-align: left;
            padding: 7px;
        }

        .cell-right {
            font-size: 14px;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            text-align: right;
            padding: 7px;
        }

        .header-cell {
            font-size: 14px;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            background-color: #efefef;
            font-weight: bold;
            text-align: left;
            padding: 7px;
            color: #222;
        }

        /* --- Images --- */
        .logo {
            margin-bottom: 20px;
            border: none;
            display: block;
        }
    </style>
    <title></title>
</head>

<body style="font-family: Arial, sans-serif; font-size: 14px; color: #222;">

<!-- Logo -->
<a th:href="${websiteUrl}" title="Yell Records" target="_blank">
    <img th:src="${logoUrl}" alt="Yell Records" class="logo">
</a>

<p class="mt-0 mb-20">
    Your order was shipped.
</p>

<p class="mt-0 mb-20">
    <b>UPS Tracking Number:</b>
    <a th:href="'https://www.ups.com/track?loc=en_US&tracknum=' + ${trackingNo}"
    th:text="${trackingNo}" style="color: #0066cc; text-decoration: none;"></a>
</p>

<h3>Order Details</h3>

<!-- ADDRESS -->
<table class="table">
    <thead>
    <tr>
        <td class="header-cell">Shipping Address</td>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td class="cell">
            <span th:text="${name}"></span><br>
            <span th:text="${addr1}"></span><br>
            <span th:if="${addr2 != null and !#strings.isEmpty(addr2)}">
                <span th:text="${addr2}"></span><br>
            </span>
            <span th:text="${cityStateZip}"></span>
        </td>
    </tr>
    </tbody>
</table>

<!-- PRODUCTS -->
<table class="table">
    <thead>
    <tr>
        <td class="header-cell">Product</td>
        <td class="header-cell" style="text-align:right;">Quantity</td>
        <td class="header-cell" style="text-align:right;">Price</td>
        <td class="header-cell" style="text-align:right;">Total</td>
    </tr>
    </thead>

    <tbody>
    <tr th:each="p : ${products}">
        <td class="cell">
            <a th:href="${websiteUrl} + '/listing/' + ${p.listingId}"
            th:text="${p.name}"></a>
        </td>
        <td class="cell-right" th:text="${p.quantity}"></td>
        <td class="cell-right" th:text="'$' + ${p.price}"></td>
        <td class="cell-right" th:text="'$' + ${p.total}"></td>
    </tr>
    </tbody>

    <tfoot>
    <tr>
        <td colspan="3" class="cell-right"><b>Sub-Total:</b></td>
        <td class="cell-right" th:text="'$' + ${subTotal}"></td>
    </tr>

    <tr>
        <td colspan="3" class="cell-right"><b>Shipping:</b></td>
        <td class="cell-right" th:text="'$' + ${shippingCost}"></td>
    </tr>

    <tr>
        <td colspan="3" class="cell-right"><b>Total:</b></td>
        <td class="cell-right" th:text="'$' + ${total}"></td>
    </tr>
    </tfoot>
</table>

<p class="mt-0 mb-20">
    Please reply to this email if you have any questions.
</p>

<!-- Footer -->
<p style="font-size:12px; color:#666; margin-top:40px;">
    &copy; Yell Records &bull; IL, United States
</p>

</body>
</html>
