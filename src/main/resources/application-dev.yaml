spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    locations: "classpath:db/migration,classpath:db/migration-postgresql"
    placeholders:
      emailCheck: "buyer_email ~ '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'"

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

images:
  provider: ${IMAGE_PROVIDER:LOCAL}
  upload-dir: ${IMAGE_UPLOAD_DIR:uploads}
  bucket: ${IMAGE_BUCKET:}
  base-url: ${IMAGE_BASE_URL:}

jwt:
  secret: ${JWT_SECRET:5ffSrvavg96EzEcIf04juxRFgA1vudQ7WUOjbO2LgGk}
