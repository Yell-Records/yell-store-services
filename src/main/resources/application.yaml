spring:
  application:
    name: yell-store-services

  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  public-url: ${PUBLIC_URL:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: INFO
    org:
      hibernate:
        orm:
          connections:
            # Disables showing database information on startup
            pooling: WARN
