spring:
  application:
    name: yell-store-services

  profiles:
    default: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    show-sql: false

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    root: INFO
    org:
      hibernate:
        orm:
          connections:
            # Disables showing database information on startup
            pooling: WARN

