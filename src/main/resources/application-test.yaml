spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: "classpath:db/migration,classpath:db/migration-h2"
    placeholders:
      emailCheck: "1=1"

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        host: invalid

images:
  provider: LOCAL
  upload-dir: uploads
  bucket:
  base-url:

paypal:
  client-id:
  client-secret:
  mode: sandbox

jobs:
  stale-order-cleanup:
    cutoff-days: 7
    enabled: false
    cron: "0 0 0 * * *"

jwt:
  secret: qKbdSQ3bgLRZJWH29euWFYxG2PZrBCEgPQJWPOs0v1P

cors:
  allowed-origins:
    - http://localhost:4200
